version: "3.8"

services:
  # ──────────────────────────────────────────────
  # Infrastructure (MongoDB, Zookeeper, Kafka)
  # ──────────────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: food-ordering-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - app-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: food-ordering-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - app-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: food-ordering-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    networks:
      - app-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "kafka-topics --bootstrap-server localhost:9092 --list || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ──────────────────────────────────────────────
  # API Gateway (Cổng 3000)
  # ──────────────────────────────────────────────
  api-gateway:
    build: ./api-gateway
    container_name: food-ordering-api-gateway
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - USER_SERVICE_URL=http://user-service:3001
      - RESTAURANT_SERVICE_URL=http://restaurant-service:3002
      - ORDER_SERVICE_URL=http://order-service:3003
      - NOTIFICATION_SERVICE_URL=http://notification-service:3004
      - JWT_SECRET=food-ordering-jwt-secret-key-2024
      - API_GATEWAY_PORT=3000
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
      user-service:
        condition: service_started
      restaurant-service:
        condition: service_started
      order-service:
        condition: service_started
      notification-service:
        condition: service_started
    networks:
      - app-network

  # ──────────────────────────────────────────────
  # User Service (Cổng 3001)
  # ──────────────────────────────────────────────
  user-service:
    build: ./user-service
    container_name: food-ordering-user-service
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/food_users_db
      - USER_SERVICE_PORT=3001
      - JWT_SECRET=food-ordering-jwt-secret-key-2024
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - app-network

  # ──────────────────────────────────────────────
  # Restaurant Service (Cổng 3002)
  # ──────────────────────────────────────────────
  restaurant-service:
    build: ./restaurant-service
    container_name: food-ordering-restaurant-service
    restart: unless-stopped
    ports:
      - "3002:3002"
    env_file:
      - .env
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/food_restaurants_db
      - KAFKA_BROKERS=kafka:29092
      - RESTAURANT_SERVICE_PORT=3002
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - app-network

  # ──────────────────────────────────────────────
  # Order Service (Cổng 3003)
  # ──────────────────────────────────────────────
  order-service:
    build: ./order-service
    container_name: food-ordering-order-service
    restart: unless-stopped
    ports:
      - "3003:3003"
    env_file:
      - .env
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/food_orders_db
      - KAFKA_BROKERS=kafka:29092
      - ORDER_SERVICE_PORT=3003
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - app-network

  # ──────────────────────────────────────────────
  # Notification Service (Cổng 3004)
  # ──────────────────────────────────────────────
  notification-service:
    build: ./notification-service
    container_name: food-ordering-notification-service
    restart: unless-stopped
    ports:
      - "3004:3004"
    env_file:
      - .env
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/food_notifications_db
      - KAFKA_BROKERS=kafka:29092
      - NOTIFICATION_SERVICE_PORT=3004
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  mongo_data:
