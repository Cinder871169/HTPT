worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # Logging
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for" '
                      'correlation_id="$http_x_correlation_id"';

    access_log  /var/log/nginx/access.log  main;
    error_log   /var/log/nginx/error.log   warn;

    sendfile        on;
    keepalive_timeout  65;

    # Rate Limiting
    limit_req_zone $binary_remote_addr zone=general_limit:10m rate=100r/s;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=50r/s;
    limit_req_status 429;

    # Upstreams
    upstream user_service {
        server user-service:3001;
    }

    upstream restaurant_service {
        server restaurant-service:3002;
    }

    upstream order_service {
        server order-service:3003;
    }

    upstream notification_service {
        server notification-service:3004;
    }

    server {
        listen 80;
        server_name localhost;

        # Add global headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header X-Content-Type-Options "nosniff" always;

        # CORS Support for local browser direct testing (if needed)
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,X-Correlation-ID' always;

        # Handle Preflight OPTIONS requests natively
        if ($request_method = 'OPTIONS') {
            return 204;
        }

        # API Gateway Healthcheck
        location = /health {
            default_type application/json;
            return 200 '{"status":"OK","service":"api-gateway-nginx","services":{"USER":"http://user-service:3001","RESTAURANT":"http://restaurant-service:3002","ORDER":"http://order-service:3003","NOTIFICATION":"http://notification-service:3004"}}';
        }

        # Auth Verification Subrequest
        location = /api/auth/verify {
            internal;
            proxy_pass http://user_service/api/auth/verify;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header X-Original-URI $request_uri;
            proxy_set_header X-Original-Method $request_method;
        }

        # ── Auth Endpoints (Public + Rate Limited) ───────────────────
        location /api/auth {
            limit_req zone=auth_limit burst=50 nodelay;
            proxy_pass http://user_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── User Profile & Management (Auth Required) ────────────────
        location /api/users {
            limit_req zone=general_limit burst=100 nodelay;
            
            # Subrequest JWT Validation
            auth_request /api/auth/verify;
            auth_request_set $user_id $upstream_http_x_user_id;
            auth_request_set $user_role $upstream_http_x_user_role;
            auth_request_set $user_email $upstream_http_x_user_email;
            
            proxy_set_header x-user-id $user_id;
            proxy_set_header x-user-role $user_role;
            proxy_set_header x-user-email $user_email;

            proxy_pass http://user_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── Restaurant & Menu Endpoints (Mixed Auth) ────────────────
        location /api/restaurants {
            limit_req zone=general_limit burst=100 nodelay;

            # Custom routing based on HTTP methods
            # GET is public, other methods (POST, PUT, DELETE) require authentication
            if ($request_method != GET) {
                rewrite ^/api/restaurants(.*)$ /api/restaurants_auth$1 last;
            }

            proxy_pass http://restaurant_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Protected Restaurant actions
        location /api/restaurants_auth {
            internal;
            auth_request /api/auth/verify;
            auth_request_set $user_id $upstream_http_x_user_id;
            auth_request_set $user_role $upstream_http_x_user_role;
            auth_request_set $user_email $upstream_http_x_user_email;
            
            proxy_set_header x-user-id $user_id;
            proxy_set_header x-user-role $user_role;
            proxy_set_header x-user-email $user_email;

            # Rewrite back to the original URI
            rewrite ^/api/restaurants_auth(.*)$ /api/restaurants$1 break;

            proxy_pass http://restaurant_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Menu Items (Mixed Auth - GET public, other methods auth required)
        location /api/menu-items {
            limit_req zone=general_limit burst=100 nodelay;

            if ($request_method != GET) {
                rewrite ^/api/menu-items(.*)$ /api/menu_items_auth$1 last;
            }

            proxy_pass http://restaurant_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/menu_items_auth {
            internal;
            auth_request /api/auth/verify;
            auth_request_set $user_id $upstream_http_x_user_id;
            auth_request_set $user_role $upstream_http_x_user_role;
            auth_request_set $user_email $upstream_http_x_user_email;
            
            proxy_set_header x-user-id $user_id;
            proxy_set_header x-user-role $user_role;
            proxy_set_header x-user-email $user_email;

            rewrite ^/api/menu_items_auth(.*)$ /api/menu-items$1 break;

            proxy_pass http://restaurant_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── Order Management (Auth Required) ────────────────────────
        location /api/orders {
            limit_req zone=general_limit burst=100 nodelay;
            
            auth_request /api/auth/verify;
            auth_request_set $user_id $upstream_http_x_user_id;
            auth_request_set $user_role $upstream_http_x_user_role;
            auth_request_set $user_email $upstream_http_x_user_email;
            
            proxy_set_header x-user-id $user_id;
            proxy_set_header x-user-role $user_role;
            proxy_set_header x-user-email $user_email;

            proxy_pass http://order_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── Notification (Auth Required) ────────────────────────────
        location /api/notifications {
            limit_req zone=general_limit burst=100 nodelay;
            
            auth_request /api/auth/verify;
            auth_request_set $user_id $upstream_http_x_user_id;
            auth_request_set $user_role $upstream_http_x_user_role;
            auth_request_set $user_email $upstream_http_x_user_email;
            
            proxy_set_header x-user-id $user_id;
            proxy_set_header x-user-role $user_role;
            proxy_set_header x-user-email $user_email;

            proxy_pass http://notification_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Error response formatting
        error_page 401 = @unauthorized;
        error_page 403 = @forbidden;
        error_page 429 = @rate_limited;
        error_page 502 503 504 = @service_unavailable;

        location @unauthorized {
            default_type application/json;
            return 401 '{"success":false,"message":"Access Denied: Unauthorized. Please check your authentication token."}';
        }

        location @forbidden {
            default_type application/json;
            return 403 '{"success":false,"message":"Access Denied: Forbidden. You do not have permission to access this resource."}';
        }

        location @rate_limited {
            default_type application/json;
            return 429 '{"success":false,"message":"Too many requests. Please slow down and try again shortly."}';
        }

        location @service_unavailable {
            default_type application/json;
            return 503 '{"success":false,"message":"Service Temporarily Unavailable. Please try again shortly."}';
        }
    }
}
